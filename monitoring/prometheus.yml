global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: fraud-scoring
    static_configs:
      - targets: ['fraud-scoring:8001']
    metrics_path: /metrics

  - job_name: enrichment
    static_configs:
      - targets: ['enrichment:8002']
    metrics_path: /metrics

  - job_name: case-management
    static_configs:
      - targets: ['case-management:8003']
    metrics_path: /metrics
